<!DOCTYPE html>
<html>
<head>
    <title>EduStream | Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            display: flex;
            color: #1f2937;
        }

        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 24px 18px;
            position: fixed;
            left: 0;
            top: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 35px;
        }

        .nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            margin: 10px 0;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.18);
        }

        .content {
            margin-left: 240px;
            width: calc(100% - 240px);
            padding: 35px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #6b7280;
            margin-bottom: 25px;
        }
        .message-box {
             background: #dcfce7;
             color: #166534;
             padding: 12px 16px;
             border-radius: 10px;
             margin-bottom: 18px;
             font-weight: 500;
             box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>

<div class="sidebar">
    <div class="logo">EduStream</div>

    <div class="nav">
        <a href="{% url 'index' %}">Dashboard</a>
        <a href="{% url 'add' %}">Add Student</a>
    </div>
</div>

<div class="content">
    {% if messages %}
    {% for message in messages %}
        <div class="message-box">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
